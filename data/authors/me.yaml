experience:
  - role: "Graduate Research Assistant"
    org: "University of Texas at Austin"
    start: "2022-09-01"
    end: "2027-06-01"
    summary: "1.High-Resolution Acoustic Tomography – Developing traveltime and Full Waveform Inversion (FWI) algorithms to enhance subsurface imaging, including processing of field data from latest-generation acoustic logging tools.<br>

      2.DAS-Based Cement Evaluation – Leveraging Distributed Acoustic Sensing (DAS) data and tube-wave propagation analysis to assess cement integrity and zonal isolation in cased-hole environments.<br>

      3.Azimuthal Anisotropy Characterization – Integrating numerical ultrasonic reflection modeling with experimental validation to quantify azimuthal anisotropic formation properties.\n"
  - role: "R & D Intern"
    org: "Halliburton"
    start: "2024-05-01"
    end: "2024-08-01"
    summary: "Developed a joint inversion workflow to enhance the estimation of pore shapes and their fractions in carbonate rocks by combining T2 distribution and rock physics models.\n"
  - role: "R & D Intern"
    org: "Halliburton"
    start: "2025-05-01"
    end: "2025-08-01"
    summary: "Developed a borehole acoustic reflection traveltime tomography method to reconstruct velocity distribution within 10 meters away from the borehole by using monopole reflected arrivals from subsurface reflectors.\n"
