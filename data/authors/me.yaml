bio: "Feiyue Xia is a dedicated Ph.D. student in Petroleum Engineering at The University of Texas at Austin, where he conducts research under the supervision of Professor Carlos Torres-Verdín. His work focuses on advancing acoustic logging processing techniques to address contemporary challenges in energy development.\ 

  Building on a strong foundation established under Professor Xiao-Ming Tang at the China University of Petroleum (East China), Feiyue specializes in the integration of borehole geophysics, rock physics, and formation evaluation. His academic experience extends internationally, including study programs in Italy and Russia, as well as participation in the IPTC Educational Week in 2019. Feiyue has been recognized with several notable distinctions, including the SPWLA Scholarship (2019) and the UT Engineering School Fellowship (2022–2026).\ 

  Committed to continued academic and professional growth, he brings enthusiasm, focus, and a global perspective to the fields of energy and geoscience engineering.\n"
